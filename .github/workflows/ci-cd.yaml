name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # JOB 1: Test
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src

      - name: Run tests
        run: npm test
        working-directory: src

  # JOB 2: Build & Push Docker Image
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src
          file: src/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # JOB 3: Manual Approval Gate
  approve-production:
    name: Approve Production Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production       # ← this is what triggers the manual approval
    steps:
      - name: Approval granted
        run: echo "Production deployment approved. Proceeding..."

  # JOB 4: Deploy (triggers instance refresh)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve-production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy - Trigger ASG Instance Refresh
        run: |
          # Check ASG exists first
          ASG_EXISTS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names production-asg \
            --query 'AutoScalingGroups | length(@)' \
            --output text)

          if [ "$ASG_EXISTS" = "0" ]; then
            echo "ASG does not exist yet. Skipping refresh — run terraform apply first."
            exit 0
          fi

          # Trigger refresh
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name production-asg \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}'

          # Wait for refresh to complete
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name production-asg \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Refresh status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Deployment complete"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed"
              exit 1
            fi
            sleep 30
          done